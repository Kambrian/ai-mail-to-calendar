<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Processing...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; background: #f5f5f5; color: #333; min-height: 100px; }
    #status { font-size: 0.95em; line-height: 1.6; white-space: pre-wrap; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ccc; border-top-color: #4a6cf7; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #e74c3c; }
    .success { color: #27ae60; }
    .close-btn { margin-top: 16px; padding: 8px 20px; background: #95a5a6; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9em; display: none; }
    .close-btn:hover { background: #7f8c8d; }
  </style>
</head>
<body>
  <div id="status"><span class="spinner"></span> Initializing...</div>
  <button class="close-btn" id="closeBtn">Close</button>
  <script src="progress.js"></script>
</body>
</html>
